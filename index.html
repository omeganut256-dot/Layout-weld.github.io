<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แผนผังและระบบตรวจประเมิน 5ส - Google Sheets Connection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .vertical-text { writing-mode: vertical-rl; text-orientation: mixed; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <div id="root"></div>

    <script type="text/babel">
        // ข้อมูลสำรองเริ่มต้น กรณีที่ยังไม่ได้เชื่อมต่อ Google Sheets
        const BACKUP_AREAS = [
            { id: 'furnace', name: 'เตาเผา', responsible: 'จัดเวรรายวัน', category: 'daily', type: 'machine', desc: 'พื้นที่รอบเตาเผาหลัก' },
            { id: 'argon95', name: 'ถังอาร์กอน 95', responsible: 'พนักงานเชื่อม', category: 'welder', type: 'gas', desc: 'จุดตั้งถังแก๊สอาร์กอนความเข้มข้น 95%' },
            { id: 'nitrogen', name: 'ถังไนโตรเจนเหลว', responsible: 'พนักงานเชื่อม', category: 'welder', type: 'gas', desc: 'ถังบรรจุแก๊สไนโตรเจนเหลว' },
            { id: 'welding_spot', name: 'เครื่องเชื่อม + เครื่องแต้ม', responsible: 'พนักงานเชื่อม / พนักงานแต้ม', category: 'welder_spot', type: 'machine', desc: 'สถานีเครื่องเชื่อมและเครื่องแต้มจุดประกอบ' },
            { id: 'ferrule_pallet', name: 'พื้นที่จัดเก็บ Ferrule + พาเรทขึ้นงาน', responsible: 'คนจัดงาน + พม่า', category: 'helpers', type: 'storage', desc: 'จุดคัดแยกอุปกรณ์และพาเรทเตรียมขึ้นโครง' },
            { id: 'hold_point', name: 'Hold Point', responsible: 'คนจัดงาน + พม่า', category: 'helpers', type: 'storage', desc: 'จุดหยุดพักชิ้นงานระหว่างส่งตรวจ' },
            { id: 'level_table', name: 'โต๊ะระดับ', responsible: 'พนักงานทุกคน', category: 'all', type: 'table', desc: 'โต๊ะหินแกรนิตวัดระดับความเรียบและขนาด' },
            { id: 'office_table', name: 'โต๊ะสำนักงาน', responsible: 'ฝ่ายสำนักงาน', category: 'office', type: 'office', desc: 'จุดงานเอกสารและระบบคอมพิวเตอร์' },
            { id: 'qa_area', name: 'QA', responsible: 'ฝ่ายสำนักงาน', category: 'office', type: 'office', desc: 'โต๊ะตรวจคุณภาพรับรองผลิตภัณฑ์' },
            { id: 'walkway_top', name: 'ทางเดินย่อย', responsible: 'พนักงานทุกคน', category: 'corridor', type: 'walkway', desc: 'ทางสัญจรขนาดเล็กฝั่งขวา' },
            { id: 'orbital_welding', name: 'เครื่องเชื่อมยาว + Orbital', responsible: 'พนักงานเชื่อม', category: 'welder', type: 'machine', desc: 'สถานีเครื่องเชื่อม Orbital อัตโนมัติ' },
            { id: 'argon100', name: 'ถังอาร์กอน 100', responsible: 'พนักงานแต้ม', category: 'spot_welder', type: 'gas', desc: 'จุดถังแก๊สอาร์กอนบริสุทธิ์พิเศษ' },
            { id: 'boiler', name: 'หม้อต้ม', responsible: 'หัวหน้าแผนก + ทีมจัดงาน', category: 'management_team', type: 'machine', desc: 'หม้อต้มจ่ายไอน้ำร้อนทำความสะอาด' },
            { id: 'empty_basket', name: 'พื้นที่วางตะกร้าเปล่า', responsible: 'หัวหน้าแผนก', category: 'supervisor', type: 'storage', desc: 'จุดคัดสรรตะกร้าเปล่ารอขึ้นงาน' },
            { id: 'order_1_15_a', name: 'Order วันที่ 1-15 (ล็อก A)', responsible: 'หัวหน้าแผนก + ทีมจัดงาน', category: 'management_team', type: 'order', desc: 'ที่พักงานเตรียมส่งงวดครึ่งแรกของเดือน' },
            { id: 'order_1_15_b', name: 'Order วันที่ 1-15 (ล็อก B)', responsible: 'หัวหน้าแผนก + ทีมจัดงาน', category: 'management_team', type: 'order', desc: 'ที่พักงานเตรียมส่งงวดครึ่งแรกของเดือน' },
            { id: 'order_1_15_c', name: 'Order วันที่ 1-15 (ล็อก C)', responsible: 'หัวหน้าแผนก + ทีมจัดงาน', category: 'management_team', type: 'order', desc: 'ที่พักงานเตรียมส่งงวดครึ่งแรกของเดือน' },
            { id: 'walkway_bottom_left', name: 'ทางเดิน (ย่อยซ้าย)', responsible: 'พนักงานทุกคน', category: 'corridor', type: 'walkway', desc: 'เส้นทางลำเลียงภายในคั่นคิวงาน' },
            { id: 'order_16_30_a', name: 'Order วันที่ 16-30 (ล็อก A)', responsible: 'หัวหน้าแผนก + ทีมจัดงาน', category: 'management_team', type: 'order', desc: 'ที่พักงานเตรียมส่งงวดครึ่งหลังของเดือน' },
            { id: 'order_16_30_b', name: 'Order วันที่ 16-30 (ล็อก B)', responsible: 'หัวหน้าแผนก + ทีมจัดงาน', category: 'management_team', type: 'order', desc: 'ที่พักงานเตรียมส่งงวดครึ่งหลังของเดือน' },
            { id: 'order_16_30_c', name: 'Order วันที่ 16-30 (ล็อก C)', responsible: 'หัวหน้าแผนก + ทีมจัดงาน', category: 'management_team', type: 'order', desc: 'ที่พักงานเตรียมส่งงวดครึ่งหลังของเดือน' },
            { id: 'walkway_center', name: 'ทางเดินหลักกลาง', responsible: 'พนักงานทุกคน', category: 'all', type: 'walkway', desc: 'เส้นทางสัญจรลำเลียงขนาดใหญ่สุดกลางโรงงาน' },
            { id: 'store_receipt', name: 'พื้นที่รับงาน Store', responsible: 'หัวหน้าแผนก + ทีมจัดงาน', category: 'management_team', type: 'store', desc: 'แท่นพักตรวจรับของจากคลังพัสดุ' },
            { id: 'tee_receipt', name: 'พื้นที่รับงาน TEE', responsible: 'หัวหน้าแผนก + ทีมจัดงาน', category: 'management_team', type: 'store', desc: 'ช่องลงของข้อต่อแยกสามทางโดยเฉพาะ' },
            { id: 'od_eb_cr_receipt', name: 'พื้นที่รับงาน OD EB CR-ER', responsible: 'หัวหน้าแผนก + ทีมจัดงาน', category: 'management_team', type: 'store', desc: 'ชั้นพักวางท่อต่อสวมปลายประเภทต่าง ๆ' }
        ];

        const CATEGORY_META = {
            welder: { label: 'พนักงานเชื่อม', colorCode: '#38bdf8', badge: 'bg-sky-100 text-sky-900 border-sky-300' },
            spot_welder: { label: 'พนักงานแต้ม', colorCode: '#2dd4bf', badge: 'bg-teal-100 text-teal-900 border-teal-300' },
            welder_spot: { label: 'พนักงานเชื่อม + แต้ม', colorCode: '#22d3ee', badge: 'bg-cyan-100 text-cyan-900 border-cyan-300' },
            helpers: { label: 'คนจัดงาน + พม่า', colorCode: '#fbbf24', badge: 'bg-amber-100 text-amber-900 border-amber-300' },
            management_team: { label: 'หัวหน้าแผนก + ทีมจัดงาน', colorCode: '#c084fc', badge: 'bg-purple-100 text-purple-900 border-purple-300' },
            supervisor: { label: 'หัวหน้าแผนก', colorCode: '#f43f5e', badge: 'bg-rose-100 text-rose-900 border-rose-300' },
            office: { label: 'ฝ่ายสำนักงาน', colorCode: '#94a3b8', badge: 'bg-slate-200 text-slate-900 border-slate-400' },
            daily: { label: 'จัดเวรรายวัน', colorCode: '#818cf8', badge: 'bg-indigo-100 text-indigo-900 border-indigo-300' },
            all: { label: 'พนักงานทุกคน', colorCode: '#34d399', badge: 'bg-emerald-100 text-emerald-950 border-emerald-300' },
            corridor: { label: 'ทางสัญจร / ส่วนกลาง', colorCode: '#cbd5e1', badge: 'bg-slate-200 text-slate-800 border-slate-300' }
        };

        function App() {
            const [webAppUrl, setWebAppUrl] = React.useState('');
            const [areas, setAreas] = React.useState(BACKUP_AREAS);
            const [selectedAreaId, setSelectedAreaId] = React.useState('furnace');
            const [loading, setLoading] = React.useState(false);
            const [submitStatus, setSubmitStatus] = React.useState({ type: '', msg: '' });

            // คะแนนเช็กเกณฑ์ตรวจประเมิน 5ส
            const [audit, setAudit] = React.useState({ seiri: false, seiton: false, seiso: false, seiketsu: false, shitsuke: false });

            const selectedArea = React.useMemo(() => {
                return areas.find(a => a.id === selectedAreaId) || areas[0];
            }, [areas, selectedAreaId]);

            // ดึงข้อมูลใหม่จาก Google Sheets
            const handleFetchData = async () => {
                if (!webAppUrl) {
                    alert('กรุณากรอก Web App URL จาก Google Apps Script ก่อนครับ');
                    return;
                }
                setLoading(true);
                try {
                    const response = await fetch(webAppUrl);
                    const data = await response.json();
                    if (Array.isArray(data) && data.length > 0) {
                        setAreas(data);
                        alert('เชื่อมต่อและดึงข้อมูลจาก Google Sheets สำเร็จ!');
                    } else {
                        alert('ดึงข้อมูลสำเร็จ แต่รูปแบบข้อมูลไม่ถูกต้อง');
                    }
                } catch (error) {
                    console.error(error);
                    alert('เกิดข้อผิดพลาดในการดึงข้อมูล กรุณาตรวจสอบสิทธิ์การแชร์ลิงก์ของ Google Sheets');
                }
                setLoading(false);
            };

            // บันทึกผลตรวจ 5ส กลับไปที่ Google Sheets
            const handleSubmitAudit = async () => {
                if (!webAppUrl) {
                    alert('กรุณากรอก Web App URL เพื่อส่งข้อมูลการตรวจประเมินเข้าตาราง Google Sheets');
                    return;
                }
                setLoading(true);
                setSubmitStatus({ type: '', msg: '' });
                
                const score = Object.values(audit).filter(Boolean).length;
                const payload = {
                    areaId: selectedArea.id,
                    areaName: selectedArea.name,
                    responsible: selectedArea.responsible,
                    ...audit,
                    score: score
                };

                try {
                    const response = await fetch(webAppUrl, {
                        method: 'POST',
                        redirect: 'follow',
                        body: JSON.stringify(payload),
                        headers: {
                            'Content-Type': 'text/plain;charset=utf-8'
                        }
                    });
                    const result = await response.json();
                    if (result.status === 'success') {
                        setSubmitStatus({ type: 'success', msg: `บันทึกผลการตรวจของ "${selectedArea.name}" เรียบร้อยแล้ว!` });
                        // รีเซ็ตการตรวจหลังบันทึกสำเร็จ
                        setAudit({ seiri: false, seiton: false, seiso: false, seiketsu: false, shitsuke: false });
                    } else {
                        setSubmitStatus({ type: 'error', msg: 'บันทึกผิดพลาด: ' + result.message });
                    }
                } catch (error) {
                    console.error(error);
                    setSubmitStatus({ type: 'error', msg: 'ส่งข้อมูลไม่สำเร็จ กรุณาตรวจสอบการตั้งค่า Apps Script' });
                }
                setLoading(false);
            };

            React.useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [areas, selectedAreaId, audit, submitStatus]);

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-6">
                    {/* ส่วนเชื่อมต่อ Google Sheets */}
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div className="flex-1">
                                <h1 className="text-xl font-extrabold text-slate-900 flex items-center gap-2">
                                    <i data-lucide="sheet" class="text-emerald-600"></i>
                                    ระบุลิงก์เชื่อมต่อ Google Sheets
                                </h1>
                                <p className="text-slate-500 text-xs mt-1">
                                    วางลิงก์ Web App URL ที่ได้จากขั้นตอนทำให้ใช้งานได้ (Deploy) ของ Apps Script เพื่อดึง/ส่งประวัติจริง
                                </p>
                            </div>
                            <div className="flex flex-col sm:flex-row gap-2 flex-[2]">
                                <input 
                                    type="text"
                                    placeholder="วางลิงก์ https://script.google.com/macros/s/..."
                                    value={webAppUrl}
                                    onChange={(e) => setWebAppUrl(e.target.value)}
                                    className="flex-1 px-3 py-2 text-xs border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500/20"
                                />
                                <button
                                    onClick={handleFetchData}
                                    disabled={loading}
                                    className="px-4 py-2 bg-emerald-600 text-white rounded-lg text-xs font-bold hover:bg-emerald-700 transition flex items-center gap-1.5 shrink-0 disabled:opacity-50"
                                >
                                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
                                    {loading ? 'กำลังเชื่อมต่อ...' : 'อัปเดตข้อมูลเวร'}
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* ผังการจัดวางพิกัดตรงตามภาพ image_10aed6.png */}
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        {/* แผนผังซ้าย */}
                        <div className="lg:col-span-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <h2 className="text-sm font-extrabold text-slate-800 mb-4 flex items-center gap-2">
                                <i data-lucide="map-pin" class="text-emerald-600"></i>
                                แผนผังจุดตรวจรับผิดชอบ (คลิกเลือกสเตชั่นที่ต้องการส่งประเมิน)
                            </h2>

                            <div className="overflow-x-auto">
                                <div className="min-w-[850px] bg-slate-950 p-6 rounded-xl border border-slate-800 shadow-inner relative">
                                    {/* ส่วนบนแก๊สสเตชั่น */}
                                    <div className="flex justify-end gap-2 pr-12 mb-2">
                                        <button onClick={() => setSelectedAreaId('argon95')} className={`px-3 py-1.5 border rounded text-[10px] font-bold ${selectedAreaId === 'argon95' ? 'bg-amber-400 text-black ring-2 ring-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>ถังอาร์กอน 95</button>
                                        <button onClick={() => setSelectedAreaId('nitrogen')} className={`px-3 py-1.5 border rounded text-[10px] font-bold ${selectedAreaId === 'nitrogen' ? 'bg-amber-400 text-black ring-2 ring-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>ถังไนโตรเจนเหลว</button>
                                    </div>

                                    {/* บล็อกบนหลัก */}
                                    <div className="grid grid-cols-12 gap-3 border-2 border-slate-700 p-3 bg-slate-900 rounded-lg">
                                        <div className="col-span-6 flex flex-col gap-3">
                                            <button onClick={() => setSelectedAreaId('furnace')} className={`h-40 border rounded-lg flex flex-col items-center justify-center p-4 text-center transition ${selectedAreaId === 'furnace' ? 'bg-sky-500 text-white font-extrabold' : 'bg-slate-800 text-slate-300 border-slate-700 hover:bg-slate-700'}`}>
                                                <span className="text-sm font-black">เตาเผา</span>
                                                <span className="text-[10px] mt-1 opacity-80">({areas.find(a => a.id === 'furnace')?.responsible})</span>
                                            </button>
                                            <button onClick={() => setSelectedAreaId('ferrule_pallet')} className={`h-60 border rounded-lg flex flex-col items-center justify-center p-4 text-center transition ${selectedAreaId === 'ferrule_pallet' ? 'bg-sky-500 text-white font-extrabold' : 'bg-slate-800 text-slate-300 border-slate-700 hover:bg-slate-700'}`}>
                                                <span className="text-xs font-black">พื้นที่จัดเก็บ Ferrule + พาเรทขึ้นงาน</span>
                                                <span className="text-[10px] mt-1 opacity-80">({areas.find(a => a.id === 'ferrule_pallet')?.responsible})</span>
                                            </button>
                                        </div>

                                        <div className="col-span-6 flex flex-col gap-3">
                                            <button onClick={() => setSelectedAreaId('welding_spot')} className={`h-40 border rounded-lg flex flex-col items-center justify-center p-4 text-center transition ${selectedAreaId === 'welding_spot' ? 'bg-sky-500 text-white font-extrabold' : 'bg-slate-800 text-slate-300 border-slate-700 hover:bg-slate-700'}`}>
                                                <span className="text-sm font-black">เครื่องเชื่อม + เครื่องแต้ม</span>
                                                <span className="text-[10px] mt-1 opacity-80">({areas.find(a => a.id === 'welding_spot')?.responsible})</span>
                                            </button>
                                            
                                            <div className="h-60 grid grid-cols-12 gap-2">
                                                <div className="col-span-6 flex flex-col gap-2 justify-between">
                                                    <button onClick={() => setSelectedAreaId('hold_point')} className={`h-10 border rounded text-[10px] font-bold ${selectedAreaId === 'hold_point' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>Hold Point</button>
                                                    <div className="flex justify-center"><button onClick={() => setSelectedAreaId('level_table')} className={`w-16 h-14 border rounded flex flex-col items-center justify-center text-[10px] font-bold ${selectedAreaId === 'level_table' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}><span>โต๊ะ</span><span>ระดับ</span></button></div>
                                                    <div className="grid grid-cols-2 gap-1.5 items-end">
                                                        <button onClick={() => setSelectedAreaId('office_table')} className={`h-16 border rounded text-[9px] font-bold ${selectedAreaId === 'office_table' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>โต๊ะสำนักงาน</button>
                                                        <button onClick={() => setSelectedAreaId('qa_area')} className={`h-12 border rounded text-[10px] font-bold ${selectedAreaId === 'qa_area' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>QA</button>
                                                    </div>
                                                </div>
                                                <button onClick={() => setSelectedAreaId('walkway_top')} className={`col-span-2 border rounded text-[10px] font-bold vertical-text text-center ${selectedAreaId === 'walkway_top' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>ทางเดิน</button>
                                                <div className="col-span-4 flex flex-col justify-between">
                                                    <button onClick={() => setSelectedAreaId('orbital_welding')} className={`flex-1 border rounded text-[10px] font-bold vertical-text text-center ${selectedAreaId === 'orbital_welding' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>เครื่องเชื่อมยาว + Orbital</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* หม้อต้ม และอาร์กอน 100 */}
                                    <div className="grid grid-cols-12 gap-3 my-3">
                                        <div className="col-span-5"></div>
                                        <div className="col-span-3 flex justify-center"><button onClick={() => setSelectedAreaId('boiler')} className={`w-full py-2 border rounded text-[10px] font-bold ${selectedAreaId === 'boiler' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>หม้อต้ม</button></div>
                                        <div className="col-span-4 flex justify-center"><button onClick={() => setSelectedAreaId('argon100')} className={`w-3/4 py-1.5 border rounded text-[10px] font-bold ${selectedAreaId === 'argon100' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>ถังอาร์กอน 100</button></div>
                                    </div>

                                    {/* แถบล่าง */}
                                    <div className="grid grid-cols-12 gap-4">
                                        <div className="col-span-6 border-2 border-slate-700 p-2 bg-slate-900 rounded-lg flex gap-1.5 h-64">
                                            <button onClick={() => setSelectedAreaId('empty_basket')} className={`w-1/8 flex-1 border rounded text-[9px] font-bold vertical-text text-center ${selectedAreaId === 'empty_basket' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>พื้นที่วางตะกร้าเปล่า</button>
                                            <div className="flex-[3] flex gap-1 border border-dashed border-slate-700 p-1 rounded">
                                                <button onClick={() => setSelectedAreaId('order_1_15_a')} className={`flex-1 border rounded text-[8px] font-bold vertical-text ${selectedAreaId === 'order_1_15_a' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>Order วันที่ 1-15 (A)</button>
                                                <button onClick={() => setSelectedAreaId('order_1_15_b')} className={`flex-1 border rounded text-[8px] font-bold vertical-text ${selectedAreaId === 'order_1_15_b' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>Order วันที่ 1-15 (B)</button>
                                                <button onClick={() => setSelectedAreaId('order_1_15_c')} className={`flex-1 border rounded text-[8px] font-bold vertical-text ${selectedAreaId === 'order_1_15_c' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>Order วันที่ 1-15 (C)</button>
                                            </div>
                                            <button onClick={() => setSelectedAreaId('walkway_bottom_left')} className={`w-8 border rounded text-[8px] font-bold vertical-text text-center ${selectedAreaId === 'walkway_bottom_left' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>ทางเดิน</button>
                                            <div className="flex-[3] flex gap-1 border border-dashed border-slate-700 p-1 rounded">
                                                <button onClick={() => setSelectedAreaId('order_16_30_a')} className={`flex-1 border rounded text-[8px] font-bold vertical-text ${selectedAreaId === 'order_16_30_a' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>Order วันที่ 16-30 (A)</button>
                                                <button onClick={() => setSelectedAreaId('order_16_30_b')} className={`flex-1 border rounded text-[8px] font-bold vertical-text ${selectedAreaId === 'order_16_30_b' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>Order วันที่ 16-30 (B)</button>
                                                <button onClick={() => setSelectedAreaId('order_16_30_c')} className={`flex-1 border rounded text-[8px] font-bold vertical-text ${selectedAreaId === 'order_16_30_c' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>Order วันที่ 16-30 (C)</button>
                                            </div>
                                        </div>

                                        <button onClick={() => setSelectedAreaId('walkway_center')} className={`col-span-2 h-64 border rounded text-xs font-black vertical-text text-center ${selectedAreaId === 'walkway_center' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>ทางเดิน</button>

                                        <div className="col-span-4 border-2 border-slate-700 p-2 bg-slate-900 rounded-lg flex gap-2 h-64">
                                            <button onClick={() => setSelectedAreaId('store_receipt')} className={`flex-1 border rounded text-[9px] font-bold vertical-text text-center ${selectedAreaId === 'store_receipt' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>พื้นที่รับงาน Store</button>
                                            <button onClick={() => setSelectedAreaId('tee_receipt')} className={`flex-1 border rounded text-[9px] font-bold vertical-text text-center ${selectedAreaId === 'tee_receipt' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>พื้นที่รับงาน TEE</button>
                                            <button onClick={() => setSelectedAreaId('od_eb_cr_receipt')} className={`flex-1 border rounded text-[9px] font-bold vertical-text text-center ${selectedAreaId === 'od_eb_cr_receipt' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>พื้นที่รับงาน OD EB CR-ER</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* การรายงานผลเข้า Google Sheets ด้านขวา */}
                        <div className="lg:col-span-4 flex flex-col gap-6">
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="p-5 text-white bg-slate-800">
                                    <span className="text-[10px] font-black uppercase tracking-widest bg-emerald-600 px-2.5 py-1 rounded-full">บันทึกผลการตรวจ 5ส</span>
                                    <h3 className="text-xl font-bold mt-2">{selectedArea.name}</h3>
                                    <p className="text-xs text-slate-300 mt-1">ผู้ดูแล: {selectedArea.responsible}</p>
                                </div>
                                <div className="p-5 flex flex-col gap-4">
                                    {/* กล่องเลือกเกณฑ์ง่ายๆ */}
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-slate-500 uppercase">เกณฑ์เช็กประเมิน:</label>
                                        
                                        <button onClick={() => setAudit({...audit, seiri: !audit.seiri})} className={`w-full p-2 text-left border rounded-lg text-xs flex items-center justify-between ${audit.seiri ? 'bg-emerald-50 border-emerald-300 text-emerald-800 font-bold' : 'bg-slate-50 border-slate-200 text-slate-600'}`}>
                                            <span>สะสาง: คัดกรองของที่ไม่จำเป็น</span>
                                            {audit.seiri ? <i data-lucide="check-circle" class="w-4 h-4 text-emerald-600"></i> : <i data-lucide="circle" class="w-4 h-4 text-slate-300"></i>}
                                        </button>

                                        <button onClick={() => setAudit({...audit, seiton: !audit.seiton})} className={`w-full p-2 text-left border rounded-lg text-xs flex items-center justify-between ${audit.seiton ? 'bg-emerald-50 border-emerald-300 text-emerald-800 font-bold' : 'bg-slate-50 border-slate-200 text-slate-600'}`}>
                                            <span>สะดวก: วางของเป็นระเบียบหยิบง่าย</span>
                                            {audit.seiton ? <i data-lucide="check-circle" class="w-4 h-4 text-emerald-600"></i> : <i data-lucide="circle" class="w-4 h-4 text-slate-300"></i>}
                                        </button>

                                        <button onClick={() => setAudit({...audit, seiso: !audit.seiso})} className={`w-full p-2 text-left border rounded-lg text-xs flex items-center justify-between ${audit.seiso ? 'bg-emerald-50 border-emerald-300 text-emerald-800 font-bold' : 'bg-slate-50 border-slate-200 text-slate-600'}`}>
                                            <span>สะอาด: ปัดกวาดเช็ดถูไร้ฝุ่นคราบ</span>
                                            {audit.seiso ? <i data-lucide="check-circle" class="w-4 h-4 text-emerald-600"></i> : <i data-lucide="circle" class="w-4 h-4 text-slate-300"></i>}
                                        </button>

                                        <button onClick={() => setAudit({...audit, seiketsu: !audit.seiketsu})} className={`w-full p-2 text-left border rounded-lg text-xs flex items-center justify-between ${audit.seiketsu ? 'bg-emerald-50 border-emerald-300 text-emerald-800 font-bold' : 'bg-slate-50 border-slate-200 text-slate-600'}`}>
                                            <span>สุขลักษณะ: รักษาสุขอนามัยปลอดภัย</span>
                                            {audit.seiketsu ? <i data-lucide="check-circle" class="w-4 h-4 text-emerald-600"></i> : <i data-lucide="circle" class="w-4 h-4 text-slate-300"></i>}
                                        </button>

                                        <button onClick={() => setAudit({...audit, shitsuke: !audit.shitsuke})} className={`w-full p-2 text-left border rounded-lg text-xs flex items-center justify-between ${audit.shitsuke ? 'bg-emerald-50 border-emerald-300 text-emerald-800 font-bold' : 'bg-slate-50 border-slate-200 text-slate-600'}`}>
                                            <span>สร้างนิสัย: รักษาวินัยอย่างยั่งยืน</span>
                                            {audit.shitsuke ? <i data-lucide="check-circle" class="w-4 h-4 text-emerald-600"></i> : <i data-lucide="circle" class="w-4 h-4 text-slate-300"></i>}
                                        </button>
                                    </div>

                                    {/* แสดงยอดรวมคะแนน */}
                                    <div className="bg-slate-50 p-3 rounded-lg border border-slate-200 flex items-center justify-between text-xs font-bold text-slate-700">
                                        <span>ผลคะแนนพื้นที่นี้:</span>
                                        <span className="text-sm text-emerald-700">{Object.values(audit).filter(Boolean).length} / 5 คะแนน</span>
                                    </div>

                                    {submitStatus.msg && (
                                        <div className={`p-3 rounded-lg text-xs font-bold ${submitStatus.type === 'success' ? 'bg-emerald-50 text-emerald-800 border border-emerald-200' : 'bg-rose-50 text-rose-800 border border-rose-200'}`}>
                                            {submitStatus.msg}
                                        </div>
                                    )}

                                    <button
                                        onClick={handleSubmitAudit}
                                        disabled={loading}
                                        className="w-full py-2.5 bg-slate-900 text-white rounded-lg text-xs font-bold hover:bg-slate-800 transition flex items-center justify-center gap-1.5 disabled:opacity-50"
                                    >
                                        <i data-lucide="send" class="w-3.5 h-3.5"></i>
                                        {loading ? 'กำลังจัดส่งข้อมูล...' : 'บันทึกคะแนนเข้า Google Sheets'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
