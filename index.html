<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แผนผังและระบบตรวจประเมิน 5ส - Google Sheets Connection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .vertical-text { writing-mode: vertical-rl; text-orientation: mixed; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <div id="root"></div>

    <script type="text/babel">
        // ข้อมูลสำรองเริ่มต้น กรณีที่ยังไม่ได้เชื่อมต่อ Google Sheets หรือดึงข้อมูลไม่สำเร็จ
        const BACKUP_AREAS = [
            { id: 'furnace', name: 'เตาเผา', responsible: 'จัดเวรรายวัน', category: 'daily', type: 'machine', desc: 'พื้นที่รอบเตาเผาหลัก' },
            { id: 'argon95', name: 'ถังอาร์กอน 95', responsible: 'พนักงานเชื่อม', category: 'welder', type: 'gas', desc: 'จุดตั้งถังแก๊สอาร์กอนความเข้มข้น 95%' },
            { id: 'nitrogen', name: 'ถังไนโตรเจนเหลว', responsible: 'พนักงานเชื่อม', category: 'welder', type: 'gas', desc: 'ถังบรรจุแก๊สไนโตรเจนเหลว' },
            { id: 'welding_spot', name: 'เครื่องเชื่อม + เครื่องแต้ม', responsible: 'พนักงานเชื่อม / พนักงานแต้ม', category: 'welder_spot', type: 'machine', desc: 'สถานีเครื่องเชื่อมและเครื่องแต้มจุดประกอบ' },
            { id: 'ferrule_pallet', name: 'พื้นที่จัดเก็บ Ferrule + พาเรทขึ้นงาน', responsible: 'คนจัดงาน + พม่า', category: 'helpers', type: 'storage', desc: 'จุดคัดแยกอุปกรณ์และพาเรทเตรียมขึ้นโครง' },
            { id: 'hold_point', name: 'Hold Point', responsible: 'คนจัดงาน + พม่า', category: 'helpers', type: 'storage', desc: 'จุดหยุดพักชิ้นงานระหว่างส่งตรวจ' },
            { id: 'level_table', name: 'โต๊ะระดับ', responsible: 'พนักงานทุกคน', category: 'all', type: 'table', desc: 'โต๊ะหินแกรนิตวัดระดับความเรียบและขนาด' },
            { id: 'office_table', name: 'โต๊ะสำนักงาน', responsible: 'ฝ่ายสำนักงาน', category: 'office', type: 'office', desc: 'จุดงานเอกสารและระบบคอมพิวเตอร์' },
            { id: 'qa_area', name: 'QA', responsible: 'ฝ่ายสำนักงาน', category: 'office', type: 'office', desc: 'โต๊ะตรวจคุณภาพรับรองผลิตภัณฑ์' },
            { id: 'walkway_top', name: 'ทางเดิน', responsible: 'พนักงานทุกคน', category: 'corridor', type: 'walkway', desc: 'ทางสัญจรขนาดเล็กฝั่งขวา' },
            { id: 'orbital_welding', name: 'เครื่องเชื่อมยาว + Orbital', responsible: 'พนักงานเชื่อม', category: 'welder', type: 'machine', desc: 'สถานีเครื่องเชื่อม Orbital อัตโนมัติ' },
            { id: 'argon100', name: 'ถังอาร์กอน 100', responsible: 'พนักงานแต้ม', category: 'spot_welder', type: 'gas', desc: 'จุดถังแก๊สอาร์กอนบริสุทธิ์พิเศษ' },
            { id: 'boiler', name: 'หม้อต้ม', responsible: 'หัวหน้าแผนก + ทีมจัดงาน', category: 'management_team', type: 'machine', desc: 'หม้อต้มจ่ายไอน้ำร้อนทำความสะอาด' },
            { id: 'empty_basket', name: 'พื้นที่วางตะกร้าเปล่า', responsible: 'หัวหน้าแผนก', category: 'supervisor', type: 'storage', desc: 'จุดคัดสรรตะกร้าเปล่ารอขึ้นงาน' },
            { id: 'order_1_15_a', name: 'Order วันที่ 1-15', responsible: 'หัวหน้าแผนก + ทีมจัดงาน', category: 'management_team', type: 'order', desc: 'ที่พักงานเตรียมส่งงวดครึ่งแรกของเดือน' },
            { id: 'order_1_15_b', name: 'Order วันที่ 1-15', responsible: 'หัวหน้าแผนก + ทีมจัดงาน', category: 'management_team', type: 'order', desc: 'ที่พักงานเตรียมส่งงวดครึ่งแรกของเดือน' },
            { id: 'order_1_15_c', name: 'Order วันที่ 1-15', responsible: 'หัวหน้าแผนก + ทีมจัดงาน', category: 'management_team', type: 'order', desc: 'ที่พักงานเตรียมส่งงวดครึ่งแรกของเดือน' },
            { id: 'walkway_bottom_left', name: 'ทางเดิน', responsible: 'พนักงานทุกคน', category: 'corridor', type: 'walkway', desc: 'เส้นทางลำเลียงภายในคั่นคิวงาน' },
            { id: 'order_16_30_a', name: 'Order วันที่ 16-30', responsible: 'หัวหน้าแผนก + ทีมจัดงาน', category: 'management_team', type: 'order', desc: 'ที่พักงานเตรียมส่งงวดครึ่งหลังของเดือน' },
            { id: 'order_16_30_b', name: 'Order วันที่ 16-30', responsible: 'หัวหน้าแผนก + ทีมจัดงาน', category: 'management_team', type: 'order', desc: 'ที่พักงานเตรียมส่งงวดครึ่งหลังของเดือน' },
            { id: 'order_16_30_c', name: 'Order วันที่ 16-30', responsible: 'หัวหน้าแผนก + ทีมจัดงาน', category: 'management_team', type: 'order', desc: 'ที่พักงานเตรียมส่งงวดครึ่งหลังของเดือน' },
            { id: 'walkway_center', name: 'ทางเดิน', responsible: 'พนักงานทุกคน', category: 'all', type: 'walkway', desc: 'เส้นทางสัญจรลำเลียงขนาดใหญ่สุดกลางโรงงาน' },
            { id: 'store_receipt', name: 'พื้นที่รับงาน Store', responsible: 'หัวหน้าแผนก + ทีมจัดงาน', category: 'management_team', type: 'store', desc: 'แท่นพักตรวจรับของจากคลังพัสดุ' },
            { id: 'tee_receipt', name: 'พื้นที่รับงาน TEE', responsible: 'หัวหน้าแผนก + ทีมจัดงาน', category: 'management_team', type: 'store', desc: 'ช่องลงของข้อต่อแยกสามทางโดยเฉพาะ' },
            { id: 'od_eb_cr_receipt', name: 'พื้นที่รับงาน OD EB CR-ER', responsible: 'หัวหน้าแผนก + ทีมจัดงาน', category: 'management_team', type: 'store', desc: 'ชั้นพักวางท่อต่อสวมปลายประเภทต่าง ๆ' }
        ];

        // ฟังก์ชันแมปรายชื่อผู้ดูแลรักษาจากภาษาไทยในชีทมาใส่ในพิกัดแผนผัง
        const mapSheetDataToAreas = (sheetData, currentAreas) => {
            return currentAreas.map(area => {
                const matchedRow = sheetData.find(row => {
                    const sheetAreaName = (row['พื้นที่'] || row['name'] || '').toString().trim().toLowerCase();
                    const currentAreaName = area.name.trim().toLowerCase();
                    
                    if (sheetAreaName === currentAreaName) return true;
                    
                    if (sheetAreaName.includes('โตรเจน') && currentAreaName.includes('โตรเจน')) return true;
                    if (sheetAreaName.includes('อาร์กอน 95') && currentAreaName.includes('อาร์กอน 95')) return true;
                    if (sheetAreaName.includes('อาร์กอน 100') && currentAreaName.includes('อาร์กอน 100')) return true;
                    if (sheetAreaName.includes('1-15') && currentAreaName.includes('1-15')) return true;
                    if (sheetAreaName.includes('16-30') && currentAreaName.includes('16-30')) return true;
                    if (sheetAreaName.includes('store') && currentAreaName.toLowerCase().includes('store')) return true;
                    if (sheetAreaName.includes('tee') && currentAreaName.toLowerCase().includes('tee')) return true;
                    if (sheetAreaName.includes('od eb') && currentAreaName.toLowerCase().includes('od eb')) return true;
                    if (sheetAreaName.includes('เครื่องเชื่อม') && currentAreaName.includes('เครื่องเชื่อม')) return true;
                    if (sheetAreaName.includes('เครื่องแต้ม') && currentAreaName.includes('เครื่องแต้ม')) return true;
                    
                    const sheetId = (row['id'] || '').toString().trim().toLowerCase();
                    if (sheetId === area.id.toLowerCase()) return true;

                    return false;
                });

                if (matchedRow) {
                    return {
                        ...area,
                        responsible: matchedRow['ผู้รับผิดชอบ'] || matchedRow['responsible'] || area.responsible
                    };
                }
                return area;
            });
        };

        // ฟังก์ชันสร้างรายการวันที่ย้อนหลังสำหรับ Dropdown
        const generateDateOptions = () => {
            const options = [];
            const today = new Date();
            for (let i = 0; i < 7; i++) {
                const d = new Date();
                d.setDate(today.getDate() - i);
                const yyyy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                const dateStr = `${yyyy}-${mm}-${dd}`;
                
                // แปลงฟอร์แมตภาษาไทยสำหรับอ่านง่าย
                const thaiFormatter = new Intl.DateTimeFormat('th-TH', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric',
                    weekday: 'short'
                });
                options.push({ value: dateStr, label: thaiFormatter.format(d) });
            }
            return options;
        };

        function App() {
            const [webAppUrl, setWebAppUrl] = React.useState('');
            const [areas, setAreas] = React.useState(BACKUP_AREAS);
            const [selectedAreaId, setSelectedAreaId] = React.useState('furnace');
            const [loading, setLoading] = React.useState(false);
            const [submitStatus, setSubmitStatus] = React.useState({ type: '', msg: '' });
            
            // เพิ่มตัวเลือกวันที่บันทึก (Dropdown Date State)
            const dateOptions = React.useMemo(() => generateDateOptions(), []);
            const [selectedAuditDate, setSelectedAuditDate] = React.useState(dateOptions[0].value);
            
            // ระบบแจ้งเตือนแบบ UI Toast แทนระบบแจ้งเตือน alert() ดั้งเดิม
            const [toast, setToast] = React.useState({ show: false, message: '', type: 'info' });

            const showNotification = (message, type = 'info') => {
                setToast({ show: true, message, type });
                setTimeout(() => {
                    setToast(prev => ({ ...prev, show: false }));
                }, 4000);
            };

            const [audit, setAudit] = React.useState({ seiri: false, seiton: false, seiso: false, seiketsu: false, shitsuke: false });

            const selectedArea = React.useMemo(() => {
                return areas.find(a => a.id === selectedAreaId) || areas[0];
            }, [areas, selectedAreaId]);

            const handleFetchData = async () => {
                if (!webAppUrl) {
                    showNotification('กรุณากรอก Web App URL จาก Google Apps Script ก่อนครับ', 'error');
                    return;
                }
                setLoading(true);
                try {
                    const response = await fetch(webAppUrl);
                    const data = await response.json();
                    
                    if (Array.isArray(data) && data.length > 0) {
                        const updatedAreas = mapSheetDataToAreas(data, BACKUP_AREAS);
                        setAreas(updatedAreas);
                        showNotification('เชื่อมต่อและดึงข้อมูลรายชื่อเวรจาก Google Sheets สำเร็จ!', 'success');
                    } else {
                        showNotification('ดึงข้อมูลสำเร็จ แต่ในตารางแผ่นงานไม่มีข้อมูลที่ระบุ', 'warning');
                    }
                } catch (error) {
                    console.error(error);
                    showNotification('ดึงข้อมูลล้มเหลว ตรวจสอบว่าเลือกสิทธิ์การเข้าถึงเป็น "ทุกคน" หรือยัง', 'error');
                }
                setLoading(false);
            };

            const handleSubmitAudit = async () => {
                if (!webAppUrl) {
                    showNotification('กรุณากรอก Web App URL เพื่อใช้สำหรับบันทึกคะแนน', 'error');
                    return;
                }
                setLoading(true);
                setSubmitStatus({ type: '', msg: '' });
                
                const score = Object.values(audit).filter(Boolean).length;
                
                // ส่งข้อมูลพร้อมระบุวันที่ตรวจจากตัวเลือก Dropdown แทน Date ปัจจุบันโดยตรง
                const payload = {
                    areaId: selectedArea.id,
                    areaName: selectedArea.name,
                    responsible: selectedArea.responsible,
                    auditDate: selectedAuditDate, // ส่งวันที่จาก Dropdown
                    ...audit,
                    score: score
                };

                try {
                    const response = await fetch(webAppUrl, {
                        method: 'POST',
                        redirect: 'follow',
                        body: JSON.stringify(payload),
                        headers: {
                            'Content-Type': 'text/plain;charset=utf-8'
                        }
                    });
                    const result = await response.json();
                    if (result.status === 'success') {
                        setSubmitStatus({ type: 'success', msg: `บันทึกผลของ "${selectedArea.name}" ประจำวันที่ ${selectedAuditDate} เรียบร้อยแล้ว!` });
                        showNotification('ส่งผลคะแนนเรียบร้อยแล้ว!', 'success');
                        setAudit({ seiri: false, seiton: false, seiso: false, seiketsu: false, shitsuke: false });
                    } else {
                        setSubmitStatus({ type: 'error', msg: 'บันทึกผิดพลาด: ' + result.message });
                    }
                } catch (error) {
                    console.error(error);
                    setSubmitStatus({ type: 'error', msg: 'ส่งข้อมูลไม่สำเร็จ กรุณาตรวจสอบการอนุญาตสิทธิ์ในระบบ Apps Script' });
                    showNotification('ส่งคะแนนล้มเหลว!', 'error');
                }
                setLoading(false);
            };

            React.useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [areas, selectedAreaId, audit, submitStatus, toast, selectedAuditDate]);

            return (
                <div className="max-w-[1600px] mx-auto p-4 md:p-6 relative">
                    
                    {/* ระบบแจ้งเตือน Pop-up (Custom Toast UI) */}
                    {toast.show && (
                        <div className={`fixed top-4 right-4 z-50 p-4 rounded-xl shadow-xl flex items-center gap-3 transition-all duration-300 transform translate-y-0 border text-sm font-semibold ${
                            toast.type === 'success' ? 'bg-emerald-500 text-white border-emerald-400' :
                            toast.type === 'error' ? 'bg-rose-500 text-white border-rose-400' :
                            toast.type === 'warning' ? 'bg-amber-500 text-white border-amber-400' :
                            'bg-slate-800 text-white border-slate-700'
                        }`}>
                            <i data-lucide="bell" class="w-4 h-4 shrink-0"></i>
                            <span>{toast.message}</span>
                        </div>
                    )}

                    {/* ส่วนเชื่อมต่อ Google Sheets */}
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 mb-6">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div className="flex-1">
                                <h1 className="text-lg font-extrabold text-slate-900 flex items-center gap-2">
                                    <i data-lucide="sheet" class="text-emerald-600"></i>
                                    ระบุลิงก์เชื่อมต่อ Google Sheets (รองรับชีทภาษาไทย)
                                </h1>
                                <p className="text-slate-500 text-xs mt-0.5">
                                    ใช้อัปเดตและซิงค์ข้อมูลผู้ดูแลกับสเปรดชีตของคุณโดยตรงผ่านทางลิงก์ Web App
                                </p>
                            </div>
                            <div className="flex flex-col sm:flex-row gap-2 flex-[2]">
                                <input 
                                    type="text"
                                    placeholder="วางลิงก์ https://script.google.com/macros/s/..."
                                    value={webAppUrl}
                                    onChange={(e) => setWebAppUrl(e.target.value)}
                                    className="flex-1 px-3 py-1.5 text-xs border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500/20"
                                />
                                <button
                                    onClick={handleFetchData}
                                    disabled={loading}
                                    className="px-4 py-1.5 bg-emerald-600 text-white rounded-lg text-xs font-bold hover:bg-emerald-700 transition flex items-center gap-1.5 shrink-0 disabled:opacity-50"
                                >
                                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
                                    {loading ? 'กำลังซิงค์ข้อมูล...' : 'อัปเดตข้อมูลเวร'}
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* ผังการจัดวางพิกัดตรงตามภาพ ปรับขยายกว้างขวางขึ้นอย่างพอดีหน้าจอ */}
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                        {/* แผนผังซ้าย ขยายขนาดคอลัมน์กว้างขึ้นเป็น lg:col-span-9 */}
                        <div className="lg:col-span-9 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                            <h2 className="text-xs font-extrabold text-slate-800 mb-3 flex items-center gap-1.5">
                                <i data-lucide="map-pin" class="text-emerald-600"></i>
                                แผนผังโรงงานและการจัดการขอบเขตพื้นที่ 5ส (ขยายขีดความกว้างหน้าจอเต็มอัตรา)
                            </h2>

                            <div className="w-full bg-slate-950 p-5 rounded-xl border border-slate-800 shadow-inner">
                                {/* ส่วนบนแก๊สสเตชั่น */}
                                <div className="flex justify-end gap-2 pr-12 mb-3">
                                    <button onClick={() => setSelectedAreaId('argon95')} className={`px-3 py-1.5 border rounded text-[10px] font-bold transition ${selectedAreaId === 'argon95' ? 'bg-amber-400 text-black ring-2 ring-white scale-105' : 'bg-slate-800 text-slate-300 border-slate-700 hover:bg-slate-700'}`}>
                                        ถังอาร์กอน 95
                                        <span className="block text-[8px] opacity-75 font-normal">({areas.find(a => a.id === 'argon95')?.responsible})</span>
                                    </button>
                                    <button onClick={() => setSelectedAreaId('nitrogen')} className={`px-3 py-1.5 border rounded text-[10px] font-bold transition ${selectedAreaId === 'nitrogen' ? 'bg-amber-400 text-black ring-2 ring-white scale-105' : 'bg-slate-800 text-slate-300 border-slate-700 hover:bg-slate-700'}`}>
                                        ถังไนโตรเจนเหลว
                                        <span className="block text-[8px] opacity-75 font-normal">({areas.find(a => a.id === 'nitrogen')?.responsible})</span>
                                    </button>
                                </div>

                                {/* บล็อกบนหลัก ขยายความสูง (h-32 และ h-52) เพื่อให้กล่องใหญ่เต็มตาไม่มี Scrollbar */}
                                <div className="grid grid-cols-12 gap-3 border border-slate-700 p-3 bg-slate-900 rounded-lg">
                                    <div className="col-span-6 flex flex-col gap-3">
                                        <button onClick={() => setSelectedAreaId('furnace')} className={`h-32 border rounded-lg flex flex-col items-center justify-center p-3 text-center transition ${selectedAreaId === 'furnace' ? 'bg-sky-500 text-white font-extrabold scale-[1.01]' : 'bg-slate-800 text-slate-300 border-slate-700 hover:bg-slate-700'}`}>
                                            <span className="text-sm font-black">เตาเผา</span>
                                            <span className="text-[10px] mt-1 opacity-80">({areas.find(a => a.id === 'furnace')?.responsible})</span>
                                        </button>
                                        <button onClick={() => setSelectedAreaId('ferrule_pallet')} className={`h-52 border rounded-lg flex flex-col items-center justify-center p-3 text-center transition ${selectedAreaId === 'ferrule_pallet' ? 'bg-sky-500 text-white font-extrabold scale-[1.01]' : 'bg-slate-800 text-slate-300 border-slate-700 hover:bg-slate-700'}`}>
                                            <span className="text-sm font-black leading-snug">พื้นที่จัดเก็บ Ferrule + พาเรทขึ้นงาน</span>
                                            <span className="text-[10px] mt-1 opacity-80">({areas.find(a => a.id === 'ferrule_pallet')?.responsible})</span>
                                        </button>
                                    </div>

                                    <div className="col-span-6 flex flex-col gap-3">
                                        <button onClick={() => setSelectedAreaId('welding_spot')} className={`h-32 border rounded-lg flex flex-col items-center justify-center p-3 text-center transition ${selectedAreaId === 'welding_spot' ? 'bg-sky-500 text-white font-extrabold scale-[1.01]' : 'bg-slate-800 text-slate-300 border-slate-700 hover:bg-slate-700'}`}>
                                            <span className="text-sm font-black">เครื่องเชื่อม + เครื่องแต้ม</span>
                                            <span className="text-[10px] mt-1 opacity-80">({areas.find(a => a.id === 'welding_spot')?.responsible})</span>
                                        </button>
                                        
                                        <div className="h-52 grid grid-cols-12 gap-2">
                                            <div className="col-span-6 flex flex-col gap-2 justify-between">
                                                <button onClick={() => setSelectedAreaId('hold_point')} className={`h-11 border rounded text-[10px] font-bold ${selectedAreaId === 'hold_point' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>
                                                    Hold Point
                                                    <span className="block text-[8px] font-normal opacity-75">({areas.find(a => a.id === 'hold_point')?.responsible})</span>
                                                </button>
                                                <div className="flex justify-center">
                                                    <button onClick={() => setSelectedAreaId('level_table')} className={`w-14 h-14 border rounded flex flex-col items-center justify-center text-[10px] font-bold ${selectedAreaId === 'level_table' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>
                                                        <span>โต๊ะ</span>
                                                        <span className="leading-none text-[9px] opacity-75">ระดับ</span>
                                                    </button>
                                                </div>
                                                <div className="grid grid-cols-2 gap-1.5 items-end">
                                                    <button onClick={() => setSelectedAreaId('office_table')} className={`h-12 border rounded text-[9px] font-bold leading-tight ${selectedAreaId === 'office_table' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>
                                                        สำนักงาน
                                                    </button>
                                                    <button onClick={() => setSelectedAreaId('qa_area')} className={`h-10 border rounded text-[10px] font-bold ${selectedAreaId === 'qa_area' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>
                                                        QA
                                                    </button>
                                                </div>
                                            </div>
                                            <button onClick={() => setSelectedAreaId('walkway_top')} className={`col-span-2 border rounded text-[10px] font-bold vertical-text text-center ${selectedAreaId === 'walkway_top' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>
                                                ทางเดิน
                                            </button>
                                            <div className="col-span-4 flex flex-col justify-between">
                                                <button onClick={() => setSelectedAreaId('orbital_welding')} className={`flex-1 border rounded text-[9px] font-bold vertical-text text-center leading-snug p-1 ${selectedAreaId === 'orbital_welding' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>
                                                    เครื่องเชื่อมยาว + Orbital
                                                    <span className="block text-[8px] font-normal opacity-75 mt-1">({areas.find(a => a.id === 'orbital_welding')?.responsible})</span>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* หม้อต้ม และอาร์กอน 100 */}
                                <div className="grid grid-cols-12 gap-3 my-3">
                                    <div className="col-span-5"></div>
                                    <div className="col-span-3 flex justify-center">
                                        <button onClick={() => setSelectedAreaId('boiler')} className={`w-full py-2 border rounded text-[10px] font-bold ${selectedAreaId === 'boiler' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>
                                            หม้อต้ม
                                            <span className="block text-[9px] font-normal opacity-75">({areas.find(a => a.id === 'boiler')?.responsible})</span>
                                        </button>
                                    </div>
                                    <div className="col-span-4 flex justify-center">
                                        <button onClick={() => setSelectedAreaId('argon100')} className={`w-3/4 py-2 border rounded text-[10px] font-bold ${selectedAreaId === 'argon100' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>
                                            ถังอาร์กอน 100
                                            <span className="block text-[9px] font-normal opacity-75">({areas.find(a => a.id === 'argon100')?.responsible})</span>
                                        </button>
                                    </div>
                                </div>

                                {/* แถบล่าง ขยายความสูงเป้น h-52 */}
                                <div className="grid grid-cols-12 gap-3">
                                    <div className="col-span-6 border border-slate-700 p-2 bg-slate-900 rounded-lg flex gap-1.5 h-52">
                                        <button onClick={() => setSelectedAreaId('empty_basket')} className={`w-1/8 flex-1 border rounded text-[9px] font-bold vertical-text text-center p-1 ${selectedAreaId === 'empty_basket' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>
                                            พื้นที่วางตะกร้าเปล่า
                                        </button>
                                        <div className="flex-[3] flex gap-1 border border-dashed border-slate-700 p-1 rounded">
                                            <button onClick={() => setSelectedAreaId('order_1_15_a')} className={`flex-1 border rounded text-[8px] font-bold vertical-text p-1 ${selectedAreaId === 'order_1_15_a' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>Order วันที่ 1-15 (A)</button>
                                            <button onClick={() => setSelectedAreaId('order_1_15_b')} className={`flex-1 border rounded text-[8px] font-bold vertical-text p-1 ${selectedAreaId === 'order_1_15_b' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>Order วันที่ 1-15 (B)</button>
                                            <button onClick={() => setSelectedAreaId('order_1_15_c')} className={`flex-1 border rounded text-[8px] font-bold vertical-text p-1 ${selectedAreaId === 'order_1_15_c' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>Order วันที่ 1-15 (C)</button>
                                        </div>
                                        <button onClick={() => setSelectedAreaId('walkway_bottom_left')} className={`w-7 border rounded text-[8px] font-bold vertical-text text-center ${selectedAreaId === 'walkway_bottom_left' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>ทางเดิน</button>
                                        <div className="flex-[3] flex gap-1 border border-dashed border-slate-700 p-1 rounded">
                                            <button onClick={() => setSelectedAreaId('order_16_30_a')} className={`flex-1 border rounded text-[8px] font-bold vertical-text p-1 ${selectedAreaId === 'order_16_30_a' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>Order วันที่ 16-30 (A)</button>
                                            <button onClick={() => setSelectedAreaId('order_16_30_b')} className={`flex-1 border rounded text-[8px] font-bold vertical-text p-1 ${selectedAreaId === 'order_16_30_b' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>Order วันที่ 16-30 (B)</button>
                                            <button onClick={() => setSelectedAreaId('order_16_30_c')} className={`flex-1 border rounded text-[8px] font-bold vertical-text p-1 ${selectedAreaId === 'order_16_30_c' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>Order วันที่ 16-30 (C)</button>
                                        </div>
                                    </div>

                                    <button onClick={() => setSelectedAreaId('walkway_center')} className={`col-span-2 h-52 border rounded text-xs font-black vertical-text text-center ${selectedAreaId === 'walkway_center' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>ทางเดินหลัก</button>

                                    <div className="col-span-4 border border-slate-700 p-2 bg-slate-900 rounded-lg flex gap-1.5 h-52">
                                        <button onClick={() => setSelectedAreaId('store_receipt')} className={`flex-1 border rounded text-[9px] font-bold vertical-text text-center p-1 ${selectedAreaId === 'store_receipt' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>
                                            พื้นที่รับงาน Store
                                        </button>
                                        <button onClick={() => setSelectedAreaId('tee_receipt')} className={`flex-1 border rounded text-[9px] font-bold vertical-text text-center p-1 ${selectedAreaId === 'tee_receipt' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>
                                            พื้นที่รับงาน TEE
                                        </button>
                                        <button onClick={() => setSelectedAreaId('od_eb_cr_receipt')} className={`flex-1 border rounded text-[9px] font-bold vertical-text text-center p-1 ${selectedAreaId === 'od_eb_cr_receipt' ? 'bg-sky-500 text-white' : 'bg-slate-800 text-slate-300 border-slate-700'}`}>
                                            พื้นที่รับงาน OD EB
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* แผงข้อมูลด้านขวา ปรับกรอบให้กระทัดรัดขึ้นเหลือ lg:col-span-3 */}
                        <div className="lg:col-span-3 flex flex-col gap-6">
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="p-4 text-white bg-slate-800">
                                    <span className="text-[9px] font-black uppercase tracking-widest bg-emerald-600 px-2 py-0.5 rounded-full">บันทึกผลการตรวจ 5ส</span>
                                    <h3 className="text-base font-bold mt-1.5">{selectedArea.name}</h3>
                                    <p className="text-[10px] text-slate-300 mt-0.5">ผู้ดูแล: {selectedArea.responsible}</p>
                                </div>
                                <div className="p-4 flex flex-col gap-3">
                                    
                                    {/* เพิ่มช่อง Dropdown สำหรับระบุวันที่ตรวจประเมิน */}
                                    <div className="flex flex-col gap-1">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase flex items-center gap-1">
                                            <i data-lucide="calendar" class="w-3.5 h-3.5 text-slate-400"></i>
                                            วันที่บันทึก (ย้อนหลังได้):
                                        </label>
                                        <select 
                                            value={selectedAuditDate} 
                                            onChange={(e) => setSelectedAuditDate(e.target.value)}
                                            className="w-full text-xs p-2 bg-slate-50 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500/20 font-medium"
                                        >
                                            {dateOptions.map(option => (
                                                <option key={option.value} value={option.value}>
                                                    {option.label}
                                                </option>
                                            ))}
                                        </select>
                                    </div>

                                    {/* กล่องเลือกเกณฑ์ 5ส */}
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase">เกณฑ์เช็กประเมิน:</label>
                                        
                                        <button onClick={() => setAudit({...audit, seiri: !audit.seiri})} className={`w-full p-2 text-left border rounded-lg text-xs flex items-center justify-between transition ${audit.seiri ? 'bg-emerald-50 border-emerald-300 text-emerald-800 font-bold' : 'bg-slate-50 border-slate-200 text-slate-600 hover:bg-slate-100'}`}>
                                            <span>สะสาง: ของไม่จำเป็น</span>
                                            {audit.seiri ? <i data-lucide="check-circle" class="w-4 h-4 text-emerald-600"></i> : <i data-lucide="circle" class="w-4 h-4 text-slate-300"></i>}
                                        </button>

                                        <button onClick={() => setAudit({...audit, seiton: !audit.seiton})} className={`w-full p-2 text-left border rounded-lg text-xs flex items-center justify-between transition ${audit.seiton ? 'bg-emerald-50 border-emerald-300 text-emerald-800 font-bold' : 'bg-slate-50 border-slate-200 text-slate-600 hover:bg-slate-100'}`}>
                                            <span>สะดวก: หยิบง่ายเป็นระเบียบ</span>
                                            {audit.seiton ? <i data-lucide="check-circle" class="w-4 h-4 text-emerald-600"></i> : <i data-lucide="circle" class="w-4 h-4 text-slate-300"></i>}
                                        </button>

                                        <button onClick={() => setAudit({...audit, seiso: !audit.seiso})} className={`w-full p-2 text-left border rounded-lg text-xs flex items-center justify-between transition ${audit.seiso ? 'bg-emerald-50 border-emerald-300 text-emerald-800 font-bold' : 'bg-slate-50 border-slate-200 text-slate-600 hover:bg-slate-100'}`}>
                                            <span>สะอาด: ปัดกวาดเช็ดถู</span>
                                            {audit.seiso ? <i data-lucide="check-circle" class="w-4 h-4 text-emerald-600"></i> : <i data-lucide="circle" class="w-4 h-4 text-slate-300"></i>}
                                        </button>

                                        <button onClick={() => setAudit({...audit, seiketsu: !audit.seiketsu})} className={`w-full p-2 text-left border rounded-lg text-xs flex items-center justify-between transition ${audit.seiketsu ? 'bg-emerald-50 border-emerald-300 text-emerald-800 font-bold' : 'bg-slate-50 border-slate-200 text-slate-600 hover:bg-slate-100'}`}>
                                            <span>สุขลักษณะ: ปลอดภัยปลอดภัย</span>
                                            {audit.seiketsu ? <i data-lucide="check-circle" class="w-4 h-4 text-emerald-600"></i> : <i data-lucide="circle" class="w-4 h-4 text-slate-300"></i>}
                                        </button>

                                        <button onClick={() => setAudit({...audit, shitsuke: !audit.shitsuke})} className={`w-full p-2 text-left border rounded-lg text-xs flex items-center justify-between transition ${audit.shitsuke ? 'bg-emerald-50 border-emerald-300 text-emerald-800 font-bold' : 'bg-slate-50 border-slate-200 text-slate-600 hover:bg-slate-100'}`}>
                                            <span>สร้างนิสัย: รักษาวินัย</span>
                                            {audit.shitsuke ? <i data-lucide="check-circle" class="w-4 h-4 text-emerald-600"></i> : <i data-lucide="circle" class="w-4 h-4 text-slate-300"></i>}
                                        </button>
                                    </div>

                                    {/* แสดงยอดรวมคะแนน */}
                                    <div className="bg-slate-50 p-2 rounded-lg border border-slate-200 flex items-center justify-between text-xs font-bold text-slate-700">
                                        <span>คะแนนประเมิน:</span>
                                        <span className="text-xs text-emerald-700">{Object.values(audit).filter(Boolean).length} / 5 คะแนน</span>
                                    </div>

                                    {submitStatus.msg && (
                                        <div className={`p-2.5 rounded-lg text-[10px] font-bold ${submitStatus.type === 'success' ? 'bg-emerald-50 text-emerald-800 border border-emerald-200' : 'bg-rose-50 text-rose-800 border border-rose-200'}`}>
                                            {submitStatus.msg}
                                        </div>
                                    )}

                                    <button
                                        onClick={handleSubmitAudit}
                                        disabled={loading}
                                        className="w-full py-2 bg-slate-900 text-white rounded-lg text-xs font-bold hover:bg-slate-800 transition flex items-center justify-center gap-1.5 disabled:opacity-50"
                                    >
                                        <i data-lucide="send" class="w-3.5 h-3.5"></i>
                                        {loading ? 'กำลังจัดส่งข้อมูล...' : 'บันทึกคะแนนเข้า Google Sheets'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
